<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect
    // Stores the current path and redirects to / where the SPA will restore it
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('gh-pages-redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
